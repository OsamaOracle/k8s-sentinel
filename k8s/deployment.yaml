apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-sentinel
  namespace: k8s-sentinel
  labels:
    app.kubernetes.io/name: k8s-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-sentinel
  template:
    metadata:
      labels:
        app: k8s-sentinel
        app.kubernetes.io/name: k8s-sentinel
    spec:
      serviceAccountName: k8s-sentinel
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: k8s-sentinel
          image: your-registry/k8s-sentinel:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: k8s-sentinel-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
