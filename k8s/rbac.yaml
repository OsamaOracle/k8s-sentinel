apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-sentinel
  namespace: k8s-sentinel
  labels:
    app.kubernetes.io/name: k8s-sentinel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-sentinel-reader
  labels:
    app.kubernetes.io/name: k8s-sentinel
rules:
  - apiGroups: [""]
    resources:
      - pods
      - events
      - nodes
      - services
      - persistentvolumeclaims
      - configmaps
      - secrets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-sentinel-reader
  labels:
    app.kubernetes.io/name: k8s-sentinel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-sentinel-reader
subjects:
  - kind: ServiceAccount
    name: k8s-sentinel
    namespace: k8s-sentinel
